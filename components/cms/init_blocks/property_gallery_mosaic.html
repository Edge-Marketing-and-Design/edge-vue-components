<section
  class="relative cms-block cms-block-property-gallery-mosaic bg-surface"
  data-block-type="property-detail-gallery-mosaic"
  data-property-detail-override="gallery-mosaic"
  data-property-gallery-layout="mosaic"
  data-property-photo-count='{{default(photos.length, "0")}}'
>
  <div class="relative grid min-h-[260px] grid-cols-2 grid-rows-[minmax(220px,1.15fr)_minmax(120px,0.85fr)_minmax(120px,0.85fr)] gap-2 md:min-h-[520px] md:grid-cols-4 md:grid-rows-2">
    <button
      type="button"
      aria-label='{{default(photos.0.alt, "Open property photo 1")}}'
      class="col-span-2 row-span-1 bg-muted bg-cover bg-center cursor-zoom-in focus:outline-none focus-visible:ring-2 focus-visible:ring-accent md:row-span-2"
      style="background-image: url('{{default(photos.0.photo_url, "")}}')"
      data-property-photo-modal-trigger
      data-property-photo-index="0"
    ></button>

    <button
      type="button"
      aria-label='{{default(photos.1.alt, "Open property photo 2")}}'
      class="aspect-[4/3] bg-muted bg-cover bg-center cursor-zoom-in focus:outline-none focus-visible:ring-2 focus-visible:ring-accent"
      style="background-image: url('{{default(photos.1.photo_url, "")}}')"
      data-property-photo-modal-trigger
      data-property-photo-index="1"
    ></button>

    <button
      type="button"
      aria-label='{{default(photos.2.alt, "Open property photo 3")}}'
      class="aspect-[4/3] bg-muted bg-cover bg-center cursor-zoom-in focus:outline-none focus-visible:ring-2 focus-visible:ring-accent"
      style="background-image: url('{{default(photos.2.photo_url, "")}}')"
      data-property-photo-modal-trigger
      data-property-photo-index="2"
    ></button>

    <button
      type="button"
      aria-label='{{default(photos.3.alt, "Open property photo 4")}}'
      class="aspect-[4/3] bg-muted bg-cover bg-center cursor-zoom-in focus:outline-none focus-visible:ring-2 focus-visible:ring-accent"
      style="background-image: url('{{default(photos.3.photo_url, "")}}')"
      data-property-photo-modal-trigger
      data-property-photo-index="3"
    ></button>

    <button
      type="button"
      aria-label='{{default(photos.4.alt, "Open property photo 5")}}'
      class="aspect-[4/3] bg-muted bg-cover bg-center cursor-zoom-in focus:outline-none focus-visible:ring-2 focus-visible:ring-accent"
      style="background-image: url('{{default(photos.4.photo_url, "")}}')"
      data-property-photo-modal-trigger
      data-property-photo-index="4"
    ></button>

    <div class="pointer-events-none absolute left-4 top-4 rounded-[2px] bg-surface/75 px-3 py-[6px] font-sans text-[11px] uppercase tracking-[0.15em] text-brand">
      {{deslug(property_type)}}
    </div>

    <button
      type="button"
      class="cw-eyebrow absolute bottom-4 right-4 bg-surface px-4 py-[10px] text-[11px] text-brand shadow-md transition-colors hover:bg-surfaceAlt focus:outline-none focus-visible:ring-2 focus-visible:ring-accent"
      data-property-photo-modal-trigger
      data-property-photo-index="0"
      data-property-photo-open-all="true"
    >
      View all {{default(photos.length, "0")}} photos
    </button>

    <div class="pointer-events-none absolute inset-x-0 top-3 z-20 flex justify-center">
      <div class="rounded-full border border-border bg-surface/95 px-4 py-1 text-[11px] font-semibold uppercase tracking-wide text-textMuted shadow-sm">
        Property Gallery Mosaic Placeholder
      </div>
    </div>
  </div>
</section>
